name: Jerney ci
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE: jerney

jobs:
  lint:
    name: "Lint job"
    runs-on: ubuntu-latest
    continue-on-error: false
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ./${{ matrix.component }}
      - name: Run ESLint
        run: npm run lint
        working-directory: ./${{ matrix.component }}
  secret-scan:
    name: "Secret scan Job"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  sast:
    name: "SAST Job"
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup the node 
        uses: actions/setup-node@v3
        with: 
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.component }}
      - name: sonarQube scan 
        uses: sonarsource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ${{ matrix.component }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  sca:
    name: "dependency checking"
    runs-on: ubuntu-latest
    needs: sast
    strategy:
      matrix:
        component: [backend,frontend]
    steps:
      - name: checkout code
        uses: actions/Checkout@v4
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{matrix.component}}/package-lock.json
      - name: Install Dependencies
        working-directory: ${{matrix.component}}
        run: npm ci
      - name: npm Audit
        working-directory: ${{matrix.component}}
        run: npm Audit --audit-level= high
  dockerfile-lint:
    name: "Dockerfile Lint"
    runs-on: ubuntu-latest
    needs: sast
    strategy:
      matrix:
        component: [backend,frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          docker-file: ${{matrix.component}}/Dockerfile
          failure-threshold: warning
  iac-scan:
    name: "Infrastruction scanning"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Terraform scanning
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft-fail: false
          skip_check: CKV_AWS_39, CKV_AWS_58
          output_format: cli
      - name: "Kubernetes manifests scan"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft-fail: true
          output_format: cli
  build:
    name: "Build Docker Image - ${{matrix.component}}"
    runs-on: ubuntu-latest
    needs:
      - sca
      - dockerfile-lint
      - iac-scan
    strategy:
      matrix:
        component: [backend, frontend]
    permissions:
      contents: read
      packages: write  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Docker buildx
        uses: docker/setup-buildx-action@v4
      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{env.DOCKER_REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{env.DOCKER_REGISTRY}}/${{github.repository}}/${{env.IMAGE}}-${{matrix.component}}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: docker build
        uses: docker/build-push-action@v4
        with:
          context: ./${{matrix.component}}
          file: ./${{matrix.component}}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
  image-scan:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        component: [backend,frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{env.DOCKER_REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{env.DOCKER_REGISTRY}}/${{github.repository}}/${{env.IMAGE}}-${{matrix.component}}:${{github.sha}}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"
      





  


